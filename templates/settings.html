<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Settings & Preferences</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='settings.css') }}"
    />
  </head>

  <body>
    <div class="settings-container">
      <!-- HEADER -->
      <div class="settings-header">
        <h1>Settings & Preferences</h1>

        <div class="settings-actions">
          <button class="reset-btn">Reset</button>
          <button class="save-btn">Save Changes</button>
        </div>
      </div>

      <!-- NAVBAR -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab(event, 'general')">
          General
        </button>
        <button class="tab" onclick="switchTab(event, 'org')">
          Organization
        </button>
        <button class="tab" onclick="switchTab(event, 'advanced')">
          Advanced
        </button>
        <button class="tab" onclick="switchTab(event, 'extras')">Extras</button>
      </div>

      <!-- CONTENT -->

      <div id="general" class="tab-content active">
        <div class="settings-card">
          <h2>General</h2>

          <div class="setting-row">
            <span>Show notifications</span>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>

          <div class="setting-row">
            <span>Confirm actions</span>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div id="org" class="tab-content">
        <div class="settings-card">
          <h2>Organization</h2>

          <div class="setting-row">
            <span>Auto-open folder after organizing</span>
            <label class="switch">
              <input type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div id="advanced" class="tab-content">
        <div class="settings-card">
          <h2>Advanced</h2>

          <div class="setting-row">
            <span>Preserve timestamps</span>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>

      <div id="extras" class="tab-content">
        <div class="settings-card">
          <h2>Extras</h2>

          <div class="setting-row">
            <span>Dark Mode</span>
            <label class="switch">
              <input type="checkbox" />
              <span class="slider"></span>
            </label>
          </div>

          <div class="setting-row">
            <span>Animations</span>
            <label class="switch">
              <input type="checkbox" checked />
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
      function switchTab(event, tabId) {
        document.querySelectorAll(".tab-content").forEach((tab) => {
          tab.classList.remove("active");
        });

        document.querySelectorAll(".tab").forEach((btn) => {
          btn.classList.remove("active");
        });

        document.getElementById(tabId).classList.add("active");
        event.currentTarget.classList.add("active");
      }
    </script>
  </body>
</html>
